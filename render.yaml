services:
  - type: web
    name: study-assistant
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python scripts/seed.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: STUDY_DB
        value: /data/study.db
    disk:
      name: study-data
      mountPath: /data
      sizeGB: 1
